<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mocha Tests (precompiled)</title>
  <link rel="stylesheet" href="../../node_modules/mocha/mocha.css" />
</head>
<body>
  <div id="mocha"></div>

  <script src="../../node_modules/expect.js/index.js"></script>
  <script src="../../node_modules/mocha/mocha.js"></script>
  <script src="../../node_modules/he/he.js"></script>
  <script type="importmap">
    {
      "imports": {
        "a-sync-waterfall": "../../src/browser/shims/a-sync-waterfall.js",
        "asap": "../../src/browser/shims/asap.js",
        "chokidar": "../../src/browser/shims/chokidar.js",
        "events": "../../src/browser/shims/events.js",
        "expect.js": "./expect-shim.js",
        "fs": "../../src/browser/shims/fs.js",
        "he": "./he-shim.js",
        "module": "../../src/browser/shims/module.js",
        "path": "../../src/browser/shims/path.js"
      }
    }
  </script>
  <script>
    delete window.require;
    window.process = window.process || { cwd: function() { return '/'; }, env: {} };
    window.process.env = window.process.env || {};
    // typeof initMochaPhantomJS === 'function' && initMochaPhantomJS();
    mocha.setup({
      ui: 'bdd',
      timeout: 10000
    });
  </script>

  <script>
    // Prefix all test suite titles with 'precompiled'
    (function(originalDescribe) {
      window.describe = window.suite = function describe(title, fn) {
        originalDescribe('precompiled ' + title, fn);
      };
    })(window.describe || window.suite);
  </script>

  <script src="console-reporter.js"></script>
  <script type="module" src="./precompiled.js"></script>
</body>
</html>
