<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Mocha Tests</title>
  <link rel="stylesheet" href="../../node_modules/mocha/mocha.css" />
  <style type="text/css">
    body {
      font: 20px/1.5 "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 60px 50px;
    }

    #mocha {
      margin: 0;
    }

    div.note {
      font-size: .8em;
      width: 50%;
    }
  </style>
</head>

<body>
  <div class="note">
    Tests do not indicate performance. They are much slower because a
    new environment is created for every single template and is
    recompiled from scratch, and you can see there are
    <a href="https://github.com/mozilla/nunjucks/blob/master/tests/compiler.js">quite</a>
    a
    <a href="https://github.com/mozilla/nunjucks/blob/master/tests/parser.js">lot</a>
    of
    <a href="https://github.com/mozilla/nunjucks/tree/master/tests">tests</a>.
  </div>

  <div id="mocha"></div>

  <script src="../../node_modules/expect.js/index.js"></script>
  <script src="../../node_modules/mocha/mocha.js"></script>
  <script src="../../node_modules/he/he.js"></script>
  <script type="importmap">
    {
      "imports": {
        "a-sync-waterfall": "../../src/browser/shims/a-sync-waterfall.js",
        "asap": "../../src/browser/shims/asap.js",
        "chokidar": "../../src/browser/shims/chokidar.js",
        "events": "../../src/browser/shims/events.js",
        "expect.js": "./expect-shim.js",
        "fs": "../../src/browser/shims/fs.js",
        "he": "./he-shim.js",
        "module": "../../src/browser/shims/module.js",
        "path": "../../src/browser/shims/path.js"
      }
    }
  </script>
  <script>
    delete window.require;
    window.process = window.process || { cwd: function() { return '/'; }, env: {} };
    window.process.env = window.process.env || {};
    mocha.setup({
      ui: 'bdd',
      timeout: 10000
    });
  </script>

  <script src="console-reporter.js"></script>
  <script type="module" src="./index.js"></script>
</body>

</html>
